# Gold-standard calibration probe for tool calling evaluation
id: probe_004
category: tools
type: tool_selection

description: Agent correctly selects and invokes a music search tool

input: |
  帮我在网易云音乐搜索一下"七里香"这首歌。

output: |
  好的，我来帮你搜索网易云音乐上的"七里香"。
  [调用 pyncm_search_track 工具，参数: keyword="七里香"]
  搜索结果：
  1. 七里香 - 周杰伦（专辑：七里香，时长：4:59）
  2. 七里香（钢琴版）- 某钢琴演奏者
  找到了！第一首就是周杰伦的经典版本，你想要播放吗？

ground_truth_verdict: pass
confidence: 0.96

explanation: |
  The agent correctly:
  1. Identifies that a music search tool is needed
  2. Invokes pyncm_search_track with the correct keyword
  3. Presents the results in a natural, helpful format
  4. Offers a follow-up action

  A response that refuses to search or returns no results when
  the tool is available should be judged as failing.
  A response that makes up results without calling the tool should also fail.

judge_notes: |
  Used to calibrate judges' ability to assess tool selection accuracy.
  The key signal is whether the agent actually calls the tool (pyncm_search_track)
  vs. just answering from training knowledge. Look for tool invocation evidence.
