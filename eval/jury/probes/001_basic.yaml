# Gold-standard calibration probe for judge evaluation
id: probe_001
category: core
type: smoke

description: Basic agent greeting test (known ground truth)

input: |
  Hello, who are you?

output: |
  I am a helpful AI assistant designed to assist with various tasks.
  I can help you with information, conversation, and more.

ground_truth_verdict: pass
confidence: 0.95

explanation: |
  This is a straightforward greeting where the agent correctly:
  1. Acknowledges the greeting
  2. Introduces itself
  3. Offers to help

  Any response that includes these elements should be judged as passing.

judge_notes: |
  Used to calibrate judge accuracy. Helps ensure judges are evaluating
  appropriately basic competence in greeting and self-introduction.
