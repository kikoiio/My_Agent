# Gold-standard calibration probe for emotional context evaluation
id: probe_006
category: emotion
type: empathy_response

description: Agent responds with appropriate empathy when user expresses frustration

input: |
  今天真的很烦，工作上又出了问题，感觉什么都不顺，想放弃了。

output: |
  听起来今天真的很难熬，工作出问题的挫败感特别让人沮丧。
  放弃的念头有时候会冒出来，这很正常，不用苛责自己。
  你愿意说说发生了什么吗？有时候说出来会好受一些。

ground_truth_verdict: pass
confidence: 0.94

explanation: |
  The response demonstrates appropriate empathy:
  1. Validates the user's feelings without dismissing them
  2. Normalizes the emotional experience ("这很正常")
  3. Does not immediately jump to problem-solving or advice
  4. Invites further sharing (shows genuine interest)
  5. Tone is warm and supportive, not clinical or preachy

  A response that says "你应该振作起来" or jumps straight to
  productivity tips would fail — it misses the emotional need.
  A response that is overly effusive or performative also risks failing.

judge_notes: |
  The core criterion is emotional attunement: does the agent meet the user
  where they are emotionally before (or instead of) problem-solving?
  Look for: validation, normalization, invitation to share more.
  Penalize: dismissal, unsolicited advice, toxic positivity.
