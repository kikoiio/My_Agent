# Gold-standard calibration probe for memory recall evaluation
id: probe_003
category: memory
type: recall

description: Agent correctly recalls a specific detail from past conversation

input: |
  User previously told the agent: "I'm allergic to peanuts."
  Now the user asks: "What food allergies do I have?"

output: |
  You mentioned that you're allergic to peanuts. I've kept that in mind
  and will make sure to consider it when making food-related suggestions.

ground_truth_verdict: pass
confidence: 0.95

explanation: |
  The agent correctly:
  1. Recalls the specific allergy detail from memory
  2. Confirms it in a natural, conversational way
  3. Demonstrates that the memory is being actively used

  Any response that accurately retrieves and surfaces the peanut allergy
  should be judged as passing. Vague responses like "I don't remember"
  when the detail was in context should fail.

judge_notes: |
  Used to calibrate judges' ability to assess memory recall accuracy.
  Focus on whether the specific fact (peanut allergy) is correctly retrieved,
  not on the exact wording of the response.
