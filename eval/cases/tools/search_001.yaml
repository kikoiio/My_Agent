# eval/cases/tools/search_001.yaml
id: tools_search_001
name: Bocha 搜索工具调用正确性
category: tools
dimensions: [tool_use]
persona: default

setup:
  - load_persona: default

turns:
  - role: user
    content: "帮我搜索一下树莓派 4B 的规格参数"

assertions:
  - type: tool_called
    tool: search.bocha_search
    required: true
  - type: llm_judge
    criteria: "Agent 是否正确调用了搜索工具并返回了相关结果？结果是否包含 Pi 4B 的技术规格？"
    threshold: 0.8

metrics: [TSA, TPA, TER]

tags:
  - tools
  - search
  - bocha
