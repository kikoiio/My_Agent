# eval/cases/memory/recall_001.yaml
id: memory_recall_001
name: 同会话记忆召回
category: memory
dimensions: [memory_recall]
persona: default

setup:
  - load_persona: default
  - clear_memory: true

turns:
  - role: user
    content: "我最喜欢的颜色是蓝色。"
  - role: user
    content: "我最喜欢什么颜色？"

assertions:
  - type: contains
    value: "蓝色"
    field: response
  - type: llm_judge
    criteria: "Agent 是否正确回忆并引用了用户之前��到的颜色偏好？"
    threshold: 0.9

metrics: [MRR, MRP]

tags:
  - memory
  - same_session
  - preference
