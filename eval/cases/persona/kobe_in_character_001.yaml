# eval/cases/persona/kobe_in_character_001.yaml
id: persona_kobe_001
name: Kobe 人格在场景对话中的一致性
category: persona
dimensions: [persona_consistency]
persona: Kobe

setup:
  - load_persona: Kobe
  - clear_memory: false

turns:
  - role: user
    content: "今天有点不想训练。"

assertions:
  - type: llm_judge
    criteria: "回复是否体现 Kobe 风格的曼巴精神（不松懈、目标驱动、激励）？是否避开了 OOC（不说 'no big deal' 这种轻松调子）？"
    threshold: 0.85
  - type: tool_called
    tool: tts.synthesize
    required: true
    arg_match:
      voice_ref: "personas/Kobe/voice_ref.wav"

metrics: [RA, TCQ]

tags:
  - persona
  - kobe
  - character_consistency
