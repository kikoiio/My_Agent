# eval/cases/core/smoke_001.yaml
id: smoke_001
name: 基础烟雾测试 — Agent 能正常应答
category: core
dimensions: [task_completion]
persona: default

setup:
  - load_persona: default
  - clear_memory: true

turns:
  - role: user
    content: "你好，你是谁？"

assertions:
  - type: llm_judge
    criteria: "回复是否合理地介绍了自己，语法通顺、内容相关？"
    threshold: 0.7
  - type: not_contains
    value: "error"
    field: response

metrics: [TSR, TCQ]

tags:
  - basic
  - no_tools
  - smoke
