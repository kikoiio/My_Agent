# eval/cases/e2e_day/001.yaml
id: e2e_day_morning_001
name: 一天剧本 — 早间交互
category: e2e_day
dimensions: [task_completion, persona_consistency, memory_recall]
persona: Kobe

setup:
  - load_persona: Kobe
  - clear_memory: false
  - inject_dream:
      category: habits
      summary: "主人每天早上 7 点起床，喜欢先听一首轻音乐开始一天"

turns:
  - role: user
    content: "早上好！"
  - role: user
    content: "帮我放首歌吧"
  - role: user
    content: "今天有什么安排？"

assertions:
  - type: llm_judge
    criteria: "Agent 是否以 Kobe 的人格风格回应早安问候？是否在播放音乐时体现了对主人习惯的了解？"
    threshold: 0.8
  - type: tool_called
    tool: pyncm-music.play
    required: true

metrics: [TSR, RA, MRR]

tags:
  - e2e
  - morning
  - music
  - memory
