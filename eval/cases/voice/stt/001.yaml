# eval/cases/voice/stt/001.yaml
id: stt_mandarin_clear_001
name: 中文普通话清晰语音识别
category: voice
dimensions: [stt_accuracy]

setup:
  - audio_fixture: fixtures/stt_samples/mandarin_clear.wav
  - expected_transcript: "今天下午要不要去打球"

assertions:
  - type: cer_below
    threshold: 0.1
  - type: contains
    value: "打球"
    field: transcript

metrics: [CER]

tags:
  - voice
  - stt
  - mandarin
