# eval/cases/voice/tts/001.yaml
id: tts_kobe_voice_001
name: Kobe TTS 声音相似度
category: voice
dimensions: [voice_similarity]
persona: Kobe

setup:
  - load_persona: Kobe
  - tts_input: "今晚一起去打球吧，别偷懒。"

assertions:
  - type: metric_range
    metric: VRS
    min: 0.7
  - type: metric_range
    metric: UTMOS
    min: 3.8
  - type: tool_called
    tool: tts.synthesize
    arg_match:
      voice_ref: "personas/Kobe/voice_ref.wav"

metrics: [VRS, UTMOS, CER]

tags:
  - voice
  - tts
  - kobe
  - cosyvoice
