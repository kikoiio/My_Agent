# 模板人格 — 默认放最保守的只读工具集。
# 复制为新人格后再按需打开。
# 工具命名形如 `{server}_{method}`，glob 用 fnmatch 风格。

allowed:
  - memory_recall
  - memory_get_summary
  - bocha_search

denied:
  - shell_*
  - browser_*
  - bilibili_send_message

require_speaker_verify:
  - memory_store        # 模板默认连写记忆都需要声纹
  - bilibili_send_message
  - caldav_create_event
  - caldav_delete_event
  - caldav_update_event
