# 该人格可见的工具白名单 / 黑名单。
# allowed 支持 glob：`pyncm-music.*` 等于该 MCP server 下全部工具。
# require_speaker_verify 内的工具调用前必须再做一次主人声纹验证。

allowed:
  - search.*
  - calendar.read
  - lark.send_dm

denied:
  - shell.*
  - bilibili.post_dynamic   # 默认不允许代发 B 站动态；按需启用

require_speaker_verify:
  - bilibili.post_dynamic
  - bilibili.send_dm
  - memory.delete
