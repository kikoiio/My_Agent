# 晓林的工具集 — 开放音乐搜索和记忆读写，保留保守安全策略

allowed:
  - memory_recall
  - memory_store
  - memory_get_summary
  - bocha_search
  - pyncm_search_track
  - pyncm_get_user_playlists
  - caldav_list_events

denied:
  - shell_*
  - browser_*
  - bilibili_send_message

require_speaker_verify:
  - memory_store
  - caldav_create_event
  - caldav_delete_event
  - caldav_update_event
