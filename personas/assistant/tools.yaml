# 该人格可见的工具白名单 / 黑名单。
# 工具命名形如 `{server}_{method}`（用下划线，符合 OpenAI function name 规范）。
# allowed / denied 支持 fnmatch glob：`pyncm_*` 等于该 server 下全部工具。
# require_speaker_verify 内的工具调用前必须再做一次主人声纹验证。
# 文本 CLI 下 speaker_verified 始终为 False，写类工具自动隐藏。

allowed:
  - bilibili_get_*       # 看直播间信息 + 拉弹幕快照
  - pyncm_*              # 网易云搜索 / 歌单 / 试播
  - memory_*             # 记忆召回 / 写入 / 概览
  - bocha_*              # web 搜索
  - caldav_list_events   # 只允许查日历

denied:
  - shell_*              # 默认不允许执行 shell
  - browser_*            # 默认不允许 headless 浏览器

require_speaker_verify:
  - bilibili_send_message
  - caldav_create_event
  - caldav_delete_event
  - caldav_update_event
