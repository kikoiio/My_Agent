# Docker Compose for multi-persona voice agent backend
# Runs backend services (LLM router, memory, observer, MCP servers)

version: '3.8'

services:
  # Main backend service (Pipecat + LangGraph + MCP)
  backend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.backend
    container_name: voice-agent-backend
    ports:
      - "8000:8000"  # Pipecat WebSocket
      - "8080:8080"  # Dashboard
    environment:
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
      - BACKEND_HOST=0.0.0.0
      - BACKEND_PORT=8000
    volumes:
      - ./data:/app/data
      - ./backend/secrets:/app/backend/secrets:ro
    networks:
      - agent-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Bilibili live chat integration
  bilibili-mcp:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.mcp
      args:
        MCP_NAME: bilibili
    container_name: mcp-bilibili
    environment:
      - BILIBILI_CREDENTIAL_FILE=/secrets/bilibili_credential.json
    volumes:
      - ./backend/secrets:/secrets:ro
    networks:
      - agent-net
    restart: unless-stopped

  # Netease Cloud Music integration
  ncm-mcp:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.mcp
      args:
        MCP_NAME: pyncm
    container_name: mcp-ncm
    environment:
      - NCM_CREDENTIAL_FILE=/secrets/ncm_credential.json
    volumes:
      - ./backend/secrets:/secrets:ro
    networks:
      - agent-net
    restart: unless-stopped

  # Web search (Bocha)
  search-mcp:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.mcp
      args:
        MCP_NAME: bocha_search
    container_name: mcp-search
    environment:
      - BOCHA_API_KEY=${BOCHA_API_KEY}
    networks:
      - agent-net
    restart: unless-stopped

  # Proactive awareness scanner — polls every 5 minutes
  proactive:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.backend
    container_name: voice-agent-proactive
    command: >
      sh -c "while true; do python scripts/run_proactive.py; sleep 300; done"
    environment:
      - MEMORY_DB_PATH=/app/data/memory.db
      - PROACTIVE_USER_ID=${PROACTIVE_USER_ID:-owner}
      - PROACTIVE_PERSONA=${PROACTIVE_PERSONA:-assistant}
    env_file:
      - backend/secrets/llm_keys.env
    volumes:
      - ./data:/app/data
    networks:
      - agent-net
    restart: unless-stopped
    depends_on:
      - backend

  # Optional: Self-hosted CosyVoice TTS server
  cosyvoice-tts:
    image: cosyvoice:latest
    container_name: cosyvoice-tts
    ports:
      - "8888:8000"
    volumes:
      - ./data/models/cosyvoice:/app/models
    networks:
      - agent-net
    restart: unless-stopped
    profiles:
      - optional

  # PostgreSQL for optional future use (not required for SQLite version)
  postgres:
    image: postgres:15-alpine
    container_name: voice-agent-db
    environment:
      POSTGRES_DB: voice_agent
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - agent-net
    restart: unless-stopped
    profiles:
      - optional

volumes:
  postgres_data:

networks:
  agent-net:
    driver: bridge
