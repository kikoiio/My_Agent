# 全局配置。秘密走 backend/secrets/ 下的 *.env，不要写在这里。

paths:
  personas: ./personas
  data: ./data
  fixtures: ./eval/fixtures

memory:
  backend: sqlite           # sqlite | mem0
  db_path: ./data/memory.db
  l1_token_budget: 12000
  l2_use_fts5: true
  sqlite:
    wal_mode: true
    busy_timeout: 5000
  dream:
    idle_minutes: 30
    pending_threshold: 20
    cron_hour: 3

owner:
  user_id: owner
  enrolled: false           # 跑 scripts/enroll_owner.py 后改为 true
  forget_file: ~/.agent/forget.txt

router:
  smart_threshold_chars: 200
  smart_keywords: [分析, 对比, 规划, 写报告, 总结]

breaker:
  max_steps: 15

ratelimit:
  bilibili_dynamic_per_day: 3
  bilibili_dm_per_minute: 10
  ncm_per_day: 200

security:
  high_risk_tools:
    - bilibili.post_dynamic
    - bilibili.send_dm
    - memory.delete
    - shell.exec
  jury_consensus_threshold: 0.75
  memory_jury_threshold: 0.6

tracer:
  db_path: ./data/traces.db
  events_retention_days: 90
  dashboard_bind: 127.0.0.1:8080
  sqlite:
    wal_mode: true
    busy_timeout: 5000

# LLM 路由别名 → 具体模型映射见 backend/litellm/router.yaml
# Pipecat / nanobot 各有独立 yaml
