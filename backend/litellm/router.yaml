# LiteLLM Router Configuration
# 用户自行填写模型名和 API Key
# 提供商：aihubmix.com (国内直连) / build.nvidia.com (国内直连)
#
# AIHubMix:  https://aihubmix.com/v1
# NVIDIA:    https://integrate.api.nvidia.com/v1

model_list:
  # 日常对话
  - model_name: default_fast
    litellm_params:
      model: coding-glm-5.1-free
      api_base: https://aihubmix.com/v1
      api_key: ${AIHUBMIX_API_KEY}
    max_input: 8000
    max_output: 2000
    temperature: 0.7

  # 复杂任务（强推理）
  - model_name: default_smart
    litellm_params:
      model: coding-glm-5.1-free
      api_base: https://aihubmix.com/v1
      api_key: ${AIHUBMIX_API_KEY}
    max_input: 8000
    max_output: 2000
    temperature: 0.7

  # 记忆整理（便宜模型即可）
  - model_name: cheap
    litellm_params:
      model: kimi-for-coding-free
      api_base: https://aihubmix.com/v1
      api_key: ${AIHUBMIX_API_KEY}
    max_input: 4000
    max_output: 1000
    temperature: 0.5

  # 多模态（视觉）
  - model_name: vision
    litellm_params:
      model: gemini-3.1-flash-image-preview-free
      api_base: https://aihubmix.com/v1
      api_key: ${AIHUBMIX_API_KEY}

  # 长上下文
  - model_name: long_context
    litellm_params:
      model: coding-glm-5.1-free
      api_base: https://aihubmix.com/v1
      api_key: ${AIHUBMIX_API_KEY}

  # Judge 评估（建议用不同模型，如有多个提供商）
  - model_name: judge_1
    litellm_params:
      model: deepseek-ai/deepseek-v4-pro
      api_base: https://integrate.api.nvidia.com/v1
      api_key: ${NVIDIA_API_KEY}

  - model_name: judge_2
    litellm_params:
      model: moonshotai/kimi-k2-thinking
      api_base: https://integrate.api.nvidia.com/v1
      api_key: ${NVIDIA_API_KEY}

  - model_name: judge_3
    litellm_params:
      model: coding-minimax-m2.7-free
      api_base: https://aihubmix.com/v1
      api_key: ${AIHUBMIX_API_KEY}

# API Keys
api_keys:
  aihubmix: "${AIHUBMIX_API_KEY}"
  nvidia: "${NVIDIA_API_KEY}"

# Cost tracking
cost_tracking:
  enabled: true
  budget_per_day: 5.0  # 人民币

# Token limits
token_limits:
  main:
    max_input: 8000
    max_output: 2000
  cheap:
    max_input: 4000
    max_output: 1000
  judge:
    max_input: 6000
    max_output: 1000

# Parameters
parameters:
  main:
    temperature: 0.7
    top_p: 0.9
  cheap:
    temperature: 0.5
    top_p: 0.9
  judge:
    temperature: 0.2
    top_p: 0.9
