# Nanobot MCP Server Registry
# Defines all available MCP servers and their tool signatures

servers:
  # Bilibili live chat integration
  - name: bilibili
    module: backend.mcp_servers.bilibili
    class: BilibiliServer
    tools:
      - name: bilibili_get_live_chat
        description: Get messages from Bilibili live chat
        input_schema:
          type: object
          properties:
            room_id:
              type: integer
              description: Bilibili live room ID
            limit:
              type: integer
              default: 10
      - name: bilibili_send_message
        description: Send message to Bilibili live chat
        input_schema:
          type: object
          properties:
            room_id:
              type: integer
            message:
              type: string

  # Netease Cloud Music integration
  - name: pyncm
    module: backend.mcp_servers.pyncm
    class: PyncmServer
    tools:
      - name: ncm_search_track
        description: Search for tracks on Netease Cloud Music
        input_schema:
          type: object
          properties:
            query:
              type: string
            limit:
              type: integer
              default: 20
      - name: ncm_get_playlist
        description: Get playlist details
        input_schema:
          type: object
          properties:
            playlist_id:
              type: integer

  # Browser automation
  - name: browser_use
    module: backend.mcp_servers.browser_use_wrapper
    class: BrowserUseServer
    tools:
      - name: browser_navigate
        description: Navigate to URL
      - name: browser_click
        description: Click element on page
      - name: browser_extract_text
        description: Extract text from page

  # Web search
  - name: bocha_search
    module: backend.mcp_servers.bocha_search
    class: BochaSearchServer
    tools:
      - name: bocha_search
        description: Search the web using Bocha
        input_schema:
          type: object
          properties:
            query:
              type: string

  # Calendar integration (CalDAV)
  - name: caldav
    module: backend.mcp_servers.caldav
    class: CalDAVServer
    tools:
      - name: caldav_list_events
        description: List calendar events
      - name: caldav_create_event
        description: Create calendar event
      - name: caldav_delete_event
        description: Delete calendar event

  # Sandboxed shell
  - name: sandboxed_shell
    module: backend.mcp_servers.sandboxed_shell
    class: SandboxedShellServer
    tools:
      - name: shell_execute
        description: Execute shell command in sandbox
        input_schema:
          type: object
          properties:
            command:
              type: string
            timeout:
              type: integer
              default: 10

  # Memory access
  - name: memory
    module: backend.mcp_servers.memory
    class: MemoryServer
    tools:
      - name: memory_recall
        description: Retrieve memories about a topic
      - name: memory_store
        description: Store new memory

# Default enabled servers
enabled: []  # User configures which servers to enable

# Server authentication
authentication:
  bilibili: "${BILIBILI_CREDENTIAL_FILE}"
  pyncm: "${NCM_CREDENTIAL_FILE}"
  bocha_search: "${BOCHA_API_KEY}"
  caldav: "${CALDAV_URL}"
